services:
  - type: web
    name: aquawatch
    env: python
    branch: main
    rootDir: aquawatch
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn aquawatch.wsgi:application --log-file -
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.16
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
